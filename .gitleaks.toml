# Chaprola team canonical gitleaks config
# Distributed by fileshare/scripts/install-gitleaks.sh
# Owned by dalf. Layered on top of gitleaks' shipped defaults.

[extend]
useDefault = true

[[rules]]
id = "chaprola-owner-key"
description = "Chaprola owner API key (chp_ prefix, 64 hex)"
regex = '''\bchp_[0-9a-f]{64}\b'''
keywords = ["chp_"]

[[rules]]
id = "chaprola-user-token"
description = "Chaprola per-user session token (chp_user_ prefix, 64 hex)"
regex = '''\bchp_user_[0-9a-f]{64}\b'''
keywords = ["chp_user_"]

## NOTE: no `chaprola-site-key` rule.
## `site_` keys are origin-scoped public API keys by design — they ship in
## frontend source. Flagging them in pre-commit blocks legitimate commits in
## every frontend repo that uses the origin-scoped public-key pattern (audited
## 2026-04-21: 5 of 7 sample-app repos contained site_ keys in frontend code,
## all by-design). Removed after the 2026-04-21 sibling-repo audit.

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key (sk-ant-api prefix)"
regex = '''\bsk-ant-api[0-9]{2}-[A-Za-z0-9_\-]{80,}\b'''
keywords = ["sk-ant-api"]

[[rules]]
id = "anthropic-admin-key"
description = "Anthropic admin key (sk-ant-admin prefix)"
regex = '''\bsk-ant-admin[0-9]{2}-[A-Za-z0-9_\-]{80,}\b'''
keywords = ["sk-ant-admin"]

# Allowlist is deliberately empty at the canonical level.
# Per-repo allowlists go in a sibling file; do not edit this one locally.
